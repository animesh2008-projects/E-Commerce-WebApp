{% extends 'base.html' %}

{% block content %}
<section class="admin-shell">
    <div class="container admin-layout">
        <aside class="admin-sidebar reveal">
            <span class="eyebrow">Admin Panel</span>
            <h1>Buyzeno Control</h1>
            <nav class="admin-nav">
                <a href="{% url 'admin_dashboard' %}" class="{% if request.resolver_match.url_name == 'admin_dashboard' %}is-active{% endif %}" data-transition>Dashboard</a>
                <a href="{% url 'admin_products' %}" class="{% if 'admin_product' in request.resolver_match.url_name or request.resolver_match.url_name == 'admin_products' %}is-active{% endif %}" data-transition>Products</a>
                <a href="{% url 'admin_orders' %}" class="{% if request.resolver_match.url_name == 'admin_orders' %}is-active{% endif %}" data-transition>Orders</a>
                <a href="{% url 'admin_users' %}" class="{% if request.resolver_match.url_name == 'admin_users' %}is-active{% endif %}" data-transition>Users</a>
            </nav>
            <div class="admin-sidebar__note">
                <p>Protected tools for catalog, stock, user, and order management.</p>
            </div>
        </aside>
        <div class="admin-content">
            {% block admin_content %}{% endblock %}
        </div>
    </div>
</section>
{% endblock %}
